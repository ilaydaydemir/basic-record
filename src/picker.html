<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #111; color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  height: 100vh; display: flex; flex-direction: column;
  -webkit-app-region: drag;
  user-select: none;
}
.titlebar {
  height: 40px; flex-shrink: 0;
  display: flex; align-items: center; padding: 0 16px 0 80px;
  gap: 8px;
}
.dot { width: 12px; height: 12px; background: #ef4444; border-radius: 50%; }
.app-title { font-size: 13px; font-weight: 700; }

.body { flex: 1; overflow: hidden; display: flex; flex-direction: column; padding: 0 20px 20px; -webkit-app-region: no-drag; }

/* Devices row */
.devices { display: flex; gap: 12px; margin-bottom: 16px; flex-shrink: 0; }
.device-group { flex: 1; display: flex; flex-direction: column; gap: 6px; }
.device-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.05em; }
select {
  background: #1a1a1a; border: 1px solid #2a2a2a; color: #ccc;
  border-radius: 7px; padding: 8px 10px; font-size: 12px; outline: none;
  -webkit-appearance: none; width: 100%;
}
select:focus { border-color: #3a3a3a; }

/* Source grid */
.section-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
.grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  overflow-y: auto; flex: 1;
}
.source-card {
  background: #1a1a1a; border: 2px solid #2a2a2a;
  border-radius: 10px; cursor: pointer;
  transition: border-color 0.15s;
  display: flex; flex-direction: column;
}
.source-card:hover { border-color: #3a3a3a; }
.source-card.selected { border-color: #ef4444; }
.thumb-wrap { border-radius: 8px 8px 0 0; overflow: hidden; }
.thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #0a0a0a; display: block; }
.source-name {
  font-size: 11px; color: #ddd; padding: 5px 8px 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-weight: 500;
}

/* Start button */
.footer { margin-top: 14px; flex-shrink: 0; display: flex; gap: 10px; align-items: center; }
.btn-start {
  flex: 1; padding: 12px; background: #ef4444; color: #fff;
  border: none; border-radius: 9px; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: background 0.15s;
}
.btn-start:hover:not(:disabled) { background: #dc2626; }
.btn-start:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; }
.btn-refresh {
  padding: 12px 14px; background: #1a1a1a; border: 1px solid #2a2a2a;
  border-radius: 9px; color: #666; cursor: pointer; font-size: 13px;
}
.btn-refresh:hover { border-color: #3a3a3a; color: #ccc; }
</style>
</head>
<body>

<div class="titlebar">
  <div class="dot"></div>
  <span class="app-title">Basic Record</span>
</div>

<div class="body">
  <div class="devices">
    <div class="device-group">
      <div class="device-label">Camera</div>
      <select id="cam-select"><option value="">No camera</option></select>
    </div>
    <div class="device-group">
      <div class="device-label">Microphone</div>
      <select id="mic-select"><option value="">No microphone</option></select>
    </div>
  </div>

  <div class="section-label">Choose what to record</div>
  <div class="grid" id="source-grid">
    <div style="color:#444;font-size:12px;grid-column:1/-1;padding:20px 0;">Loading sources…</div>
  </div>

  <div class="footer" style="flex-direction:column;gap:8px;">
    <div style="display:flex;gap:10px;width:100%;">
      <button class="btn-refresh" id="refresh-btn" title="Refresh sources">↻</button>
      <button class="btn-start" id="start-btn" disabled style="flex:1;">▶ Start Recording</button>
    </div>
    <div style="display:flex;gap:8px;align-items:center;width:100%;">
      <button id="region-btn" style="
        flex:1;padding:8px;background:#1a1a1a;border:1px solid #2a2a2a;
        border-radius:8px;color:#888;font-size:12px;font-weight:600;cursor:pointer;
      ">✂ Select Region (optional)</button>
    </div>
    <div id="region-label" style="font-size:11px;color:#4ade80;display:none;text-align:center;"></div>
  </div>
</div>

<script src="picker.js"></script>
</body>
</html>
