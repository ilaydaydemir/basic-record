<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:transparent; cursor:crosshair; }
canvas { position:fixed; top:0; left:0; }
.hint {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.7); color:#fff;
  padding:10px 18px; border-radius:10px;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:14px; pointer-events:none;
  text-align:center; line-height:1.6;
}
.hint.hidden { display:none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint" id="hint">Drag to select the area<br><small style="color:#aaa">Press Esc to cancel</small></div>
<script src="region.js"></script>
</body>
</html>
