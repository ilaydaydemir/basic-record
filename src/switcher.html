<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#111; color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  height:100vh; display:flex; flex-direction:column;
  -webkit-app-region:drag;
}
.titlebar { height:40px; flex-shrink:0; display:flex; align-items:center; padding:0 16px 0 80px; }
.title { font-size:13px; font-weight:600; color:#aaa; }
.body { flex:1; padding:8px 16px 16px; overflow-y:auto; -webkit-app-region:no-drag; }
.note { font-size:11px; color:#555; margin-bottom:12px; }
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.card {
  background:#1a1a1a; border:2px solid #2a2a2a; border-radius:9px;
  overflow:hidden; cursor:pointer; transition:border-color 0.15s;
}
.card:hover { border-color:#ef4444; }
.thumb { width:100%; aspect-ratio:16/9; object-fit:cover; background:#0a0a0a; display:block; }
.name { font-size:10px; color:#777; padding:5px 7px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.loading { color:#444; font-size:12px; padding:20px 0; }
</style>
</head>
<body>
<div class="titlebar"><span class="title">Switch Source (recording continues)</span></div>
<div class="body">
  <div class="note">Click a source to switch — your recording keeps going without interruption.</div>
  <div class="grid" id="grid"><div class="loading">Loading…</div></div>
</div>
<script>
(async () => {
  const grid = document.getElementById('grid');
  const sources = await window.api.getSources();
  grid.innerHTML = '';
  sources.forEach(src => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<img class="thumb" src="${src.thumbnail}"><div class="name">${src.name}</div>`;
    card.addEventListener('click', () => window.api.notifySwitchSource(src.id));
    grid.appendChild(card);
  });
})();
</script>
</body>
</html>
